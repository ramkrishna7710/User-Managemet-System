<div class="container mt-5">

  <div class="card p-4 text-center shadow">

    <h3>👤 My Profile</h3>

    <img *ngIf="imageUrl" [src]="imageUrl"
         style="width:120px; height:120px; border-radius:50%; margin:10px auto; display:block;" />

    <input type="file" (change)="upload($event)" class="form-control mt-3">

  </div>

</div>
