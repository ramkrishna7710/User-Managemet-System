<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">

  <div class="card p-4 shadow" style="width: 350px;">

    <h3 class="text-center mb-3">🔐 Login</h3>

    <input [(ngModel)]="email" placeholder="Email" class="form-control mb-3">

    <input [(ngModel)]="password" type="password" placeholder="Password" class="form-control mb-3">

    <!-- Demo Credentials -->
    <div class="alert alert-info mb-3">
      <strong>Demo Credentials:</strong><br>
      Admin: admin@gmail.com<br>
      User: user@gmail.com<br>
      Password: anything
    </div>

    <button (click)="login()" class="btn btn-primary w-100">
      Login
    </button>

  </div>

</div>
